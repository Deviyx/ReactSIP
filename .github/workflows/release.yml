name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Sync native SIP agent
        run: npm run native:sync-agent

      - name: Verify native SIP agent exists
        shell: pwsh
        run: |
          if (-not (Test-Path "native/sip-agent/bin/sip-agent.exe")) {
            throw "native/sip-agent/bin/sip-agent.exe not found. Commit it or generate it before releasing."
          }

      - name: Publish release assets to GitHub
        run: npx electron-builder --win nsis portable --publish never

      - name: Build whisper runtime package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller faster-whisper
          if (-not (Test-Path "release")) {
            New-Item -ItemType Directory -Path "release" | Out-Null
          }
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          if (Test-Path "dist") { Remove-Item -Recurse -Force "dist" }
          if (Test-Path "whisper-runtime") { Remove-Item -Recurse -Force "whisper-runtime" }
          python -m PyInstaller --noconfirm --clean --onefile --name faster-whisper-worker scripts/faster_whisper_worker.py
          New-Item -ItemType Directory -Path "whisper-runtime" | Out-Null
          Copy-Item "dist/faster-whisper-worker.exe" "whisper-runtime/faster-whisper-worker.exe" -Force
          Compress-Archive -Path "whisper-runtime/*" -DestinationPath "release/whisper-runtime-win-x64.zip" -Force
          Get-ChildItem "release/whisper-runtime-win-x64.zip" | Format-List FullName, Length

      - name: Clean existing release assets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            for (const asset of release.assets || []) {
              core.info(`Deleting old asset: ${asset.name}`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id,
              });
            }

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          overwrite_files: true
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/whisper-runtime-win-x64.zip
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Upload local artifacts (workflow artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactsip-release-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
            release/whisper-runtime-win-x64.zip
          if-no-files-found: ignore
