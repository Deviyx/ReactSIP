name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Sync native SIP agent
        run: npm run native:sync-agent

      - name: Verify native SIP agent exists
        shell: pwsh
        run: |
          if (-not (Test-Path "native/sip-agent/bin/sip-agent.exe")) {
            throw "native/sip-agent/bin/sip-agent.exe not found. Commit it or generate it before releasing."
          }

      - name: Publish release assets to GitHub
        run: npx electron-builder --win nsis portable --publish never

      - name: Publish assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Upload local artifacts (workflow artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactsip-release-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: ignore
